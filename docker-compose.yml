services:
  deafchat:
    build: .
    container_name: deafchat
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - coturn
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: deafchat-turn
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped

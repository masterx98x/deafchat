services:
  frontend:
    build:
      context: ./frontend
    container_name: deafchat-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8090:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deafchat-backend
    env_file:
      - .env
    depends_on:
      - coturn
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: deafchat-turn
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
